<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>16宫格找色差 - 可选难度</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background-color: #f5f5f5;
            gap: 20px;
        }

        .title {
            font-size: 26px;
            color: #333;
            font-weight: bold;
        }

        .difficulty {
            display: flex;
            gap: 12px;
            margin-bottom: 10px;
        }

        .diff-btn {
            padding: 10px 18px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            background: #e0e0e0;
            transition: all 0.2s;
        }

        .diff-btn:hover {
            transform: scale(1.05);
        }

        .diff-btn.active {
            background: #4e8cff;
            color: white;
        }

        .grid {
            display: grid !important;
            grid-template-columns: repeat(4, 120px);
            grid-template-rows: repeat(4, 120px);
            gap: 8px;
        }

        .cell {
            border-radius: 6px;
            cursor: pointer;
            transition: transform 0.15s;
        }

        .cell:hover {
            transform: scale(1.03);
        }

        #tip {
            font-size: 18px;
            color: #555;
            height: 24px;
        }
    </style>
</head>
<body>
    <div class="title">🎯 找出颜色不一样的格子</div>

    <div class="difficulty">
        <button class="diff-btn" data-level="easy">初级</button>
        <button class="diff-btn" data-level="medium">中级</button>
        <button class="diff-btn" data-level="hard">高级</button>
        <button class="diff-btn" data-level="expert">专家级</button>
    </div>

    <div id="tip">加载中...</div>
    <div class="grid" id="grid"></div>

    <script>
        // 强制等页面加载完再执行所有代码
        document.addEventListener('DOMContentLoaded', function() {
            const grid = document.getElementById('grid');
            const tip = document.getElementById('tip');
            const diffBtns = document.querySelectorAll('.diff-btn');
            const totalCells = 16;

            let currentLevel = 'easy';

            const levelConfig = {
                easy: 14,
                medium: 8,
                hard: 4,
                expert: 2
            };

            // 渲染游戏
            function renderGame() {
                grid.innerHTML = '';
                tip.textContent = "✅ 请找出颜色不同的格子";
                tip.style.color = '#555';

                const baseRGB = getRandomBaseColor();
                const normalColor = `rgb(${baseRGB[0]}, ${baseRGB[1]}, ${baseRGB[2]})`;
                const diffColor = getSlightlyDifferentColor(baseRGB);
                const diffIndex = Math.floor(Math.random() * totalCells);

                for (let i = 0; i < totalCells; i++) {
                    const cell = document.createElement('div');
                    cell.classList.add('cell');

                    if (i === diffIndex) {
                        cell.style.backgroundColor = diffColor;
                        cell.onclick = () => {
                            tip.textContent = "🎉 找对啦！即将下一题~";
                            tip.style.color = "#28a745";
                            setTimeout(renderGame, 900);
                        };
                    } else {
                        cell.style.backgroundColor = normalColor;
                        cell.onclick = () => {
                            tip.textContent = "❌ 不对哦，再仔细看看";
                            tip.style.color = "#dc3545";
                        };
                    }
                    grid.appendChild(cell);
                }
            }

            // 随机颜色
            function getRandomBaseColor() {
                const r = Math.floor(Math.random() * 200) + 30;
                const g = Math.floor(Math.random() * 200) + 30;
                const b = Math.floor(Math.random() * 200) + 30;
                return [r, g, b];
            }

            // 色差
            function getSlightlyDifferentColor(base) {
                const [r, g, b] = base;
                const offset = levelConfig[currentLevel];
                const newR = Math.max(0, Math.min(255, r + (Math.random() > 0.5 ? offset : -offset)));
                const newG = Math.max(0, Math.min(255, g + (Math.random() > 0.5 ? offset : -offset)));
                const newB = Math.max(0, Math.min(255, b + (Math.random() > 0.5 ? offset : -offset)));
                return `rgb(${newR}, ${newG}, ${newB})`;
            }

            // 绑定按钮
            diffBtns.forEach(btn => {
                btn.onclick = () => {
                    diffBtns.forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    currentLevel = btn.dataset.level;
                    renderGame(); // 点击一定刷新
                };
            });

            // 自动开始
            diffBtns[0].click();
        });
    </script>
</body>
</html>
