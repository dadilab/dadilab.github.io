
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>多功能计时器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            padding: 20px;
            background: linear-gradient(135deg, #e0e5ec 0%, #f5f7fa 100%);
            min-height: 100vh;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        /* 头部：标题 + 时钟 + 添加按钮 */
        .header {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 16px;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }

        .header-left {
            flex: 1;
        }

        .header-left h1 {
            font-size: 28px;
            color: #2c3e50;
            font-weight: 600;
            margin-bottom: 12px;
        }

        .header-left .controls {
            text-align: left;
        }

        .clock {
            background: rgba(255,255,255,0.75);
            backdrop-filter: blur(8px);
            border-radius: 12px;
            padding: 12px 20px;
            min-width: 160px;
            text-align: center;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
            flex-shrink: 0;
        }

        .clock .clock-date {
            font-size: 13px;
            color: #888;
            margin-bottom: 4px;
            font-weight: 500;
        }

        .clock .clock-time {
            font-size: 28px;
            font-family: "Consolas", "Courier New", monospace;
            color: #2c3e50;
            font-weight: 700;
            letter-spacing: 1px;
        }

        #addTimer {
            padding: 12px 28px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 500;
            transition: transform 0.15s, box-shadow 0.15s;
        }

        #addTimer:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
        }

        .timers-container {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            justify-content: center;
            transition: gap 0.3s;
        }

        .timers-container .timer-card {
            flex: 0 1 320px;
            max-width: 420px;
            transition: flex 0.4s ease, max-width 0.4s ease;
        }

        /* 1 个计时器：居中，限制最大宽度 */
        .timers-container.layout-1 {
            justify-content: center;
        }
        .timers-container.layout-1 .timer-card {
            flex: 0 1 420px;
        }

        /* 2 个计时器：左右对称 */
        .timers-container.layout-2 {
            justify-content: center;
        }
        .timers-container.layout-2 .timer-card {
            flex: 0 1 calc(50% - 20px);
            max-width: 480px;
        }

        /* 3 个计时器：左中右均匀分布 */
        .timers-container.layout-3 {
            justify-content: center;
        }
        .timers-container.layout-3 .timer-card {
            flex: 0 1 calc(33.333% - 20px);
            max-width: 400px;
        }

        /* 4+ 个计时器：标准网格回退 */
        .timers-container.layout-4 {
            justify-content: flex-start;
        }
        .timers-container.layout-4 .timer-card {
            flex: 0 1 calc(33.333% - 20px);
            max-width: 400px;
        }

        .timer-card {
            background: #fff;
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.08);
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: box-shadow 0.3s;
            border-top: 4px solid #667eea;
            position: relative;
        }

        .timer-card:nth-child(6n+1) { border-top-color: #667eea; }
        .timer-card:nth-child(6n+2) { border-top-color: #e74c3c; }
        .timer-card:nth-child(6n+3) { border-top-color: #2ecc71; }
        .timer-card:nth-child(6n+4) { border-top-color: #f39c12; }
        .timer-card:nth-child(6n+5) { border-top-color: #9b59b6; }
        .timer-card:nth-child(6n+6) { border-top-color: #1abc9c; }

        .card-header {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 4px;
        }

        .card-title {
            font-size: 13px;
            color: #bbb;
            font-weight: 500;
            padding: 4px 8px;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.2s, color 0.2s;
            user-select: none;
            line-height: 1.4;
            min-width: 20px;
        }

        .card-title:hover {
            background: #f5f5f5;
            color: #999;
        }

        .card-title:focus {
            outline: 2px solid #667eea;
            outline-offset: 1px;
            background: #f8f9ff;
            color: #333;
            user-select: text;
            cursor: text;
        }

        .btn-delete-icon {
            width: 32px;
            height: 32px;
            border: none;
            border-radius: 8px;
            background: transparent;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s, transform 0.15s, color 0.2s;
            color: #ccc;
            font-size: 18px;
            line-height: 1;
            flex-shrink: 0;
        }

        .btn-delete-icon:hover {
            background: #fee2e2;
            color: #e74c3c;
            transform: scale(1.1);
        }

        .btn-delete-icon:active {
            transform: scale(0.95);
        }

        .timer-display {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            margin: 16px 0;
            font-family: "Consolas", "Courier New", monospace;
            color: #2c3e50;
            font-weight: 600;
        }

        .timer-segment {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
        }

        .timer-segment .num {
            font-size: 3rem;
            letter-spacing: 2px;
            line-height: 1;
        }

        .timer-segment .label {
            font-size: 11px;
            color: #bbb;
            font-weight: 400;
            letter-spacing: 0;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .timer-sep {
            font-size: 3rem;
            color: #ccc;
            font-weight: 600;
            line-height: 1;
            margin-top: 0;
            align-self: flex-start;
        }

        .timer-controls {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
            margin-bottom: 10px;
        }

        .timer-controls button {
            padding: 7px 14px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            transition: opacity 0.2s, transform 0.1s;
        }

        .timer-controls button:hover {
            opacity: 0.85;
            transform: translateY(-1px);
        }

        .timer-controls .start   { background: #2ecc71; color: #fff; }
        .timer-controls .pause   { background: #f39c12; color: #fff; }
        .timer-controls .reset   { background: #95a5a6; color: #fff; }
        .timer-controls .fullscreen { background: #3498db; color: #fff; }

        .timer-type {
            margin-bottom: 12px;
            display: flex;
            gap: 16px;
            font-size: 14px;
            color: #555;
        }

        .timer-type label {
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }

        .timer-type input[type="radio"] {
            accent-color: #667eea;
        }

        /* 全屏模式 */
        .timer-card.fullscreen {
            position: fixed;
            inset: 0;
            width: 100vw;
            height: 100vh;
            z-index: 1000;
            background: #1a1a2e;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border-radius: 0;
            padding: 40px;
            border-top: none !important;
            box-shadow: none;
            flex: none;
            max-width: none;
            animation: fullscreenIn 0.3s ease;
        }

        @keyframes fullscreenIn {
            from { opacity: 0; transform: scale(0.96); }
            to   { opacity: 1; transform: scale(1); }
        }

        body.has-fullscreen {
            overflow: hidden;
        }

        .timer-card.fullscreen .timer-display {
            color: #fff;
            margin: 0;
            gap: clamp(8px, 2vw, 32px);
        }

        .timer-card.fullscreen .timer-segment .num {
            font-size: clamp(3rem, 20vw, 10rem);
        }

        .timer-card.fullscreen .timer-segment .label {
            opacity: 0.5;
            color: rgba(255,255,255,0.6);
            font-size: clamp(0.6rem, 2vw, 1rem);
        }

        .timer-card.fullscreen .timer-sep {
            font-size: clamp(3rem, 20vw, 10rem);
            color: rgba(255,255,255,0.3);
            align-self: center;
        }

        .timer-card.fullscreen .timer-controls {
            display: none;
        }

        .timer-card.fullscreen .timer-type {
            display: none;
        }

        .timer-card.fullscreen .card-header {
            display: none;
        }

        .timer-card.fullscreen::after {
            content: "按 ESC 退出全屏";
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255,255,255,0.3);
            font-size: 14px;
        }

        /* 倒计时结束提示 */
        .countdown-finished .timer-display {
            color: #e74c3c;
            animation: pulse 0.6s ease-in-out infinite alternate;
        }

        /* 全屏模式下倒计时结束同样高亮（提升优先级覆盖全屏白色） */
        .timer-card.fullscreen.countdown-finished .timer-display {
            color: #ff6b6b;
        }

        @keyframes pulse {
            from { opacity: 1; }
            to   { opacity: 0.3; }
        }

        /* Modal 弹窗 */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(0,0,0,0.45);
            backdrop-filter: blur(4px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 5000;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.3s, visibility 0.3s;
        }

        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .modal-box {
            background: #fff;
            border-radius: 16px;
            padding: 32px 36px;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.25);
            transform: scale(0.9) translateY(20px);
            transition: transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .modal-overlay.active .modal-box {
            transform: scale(1) translateY(0);
        }

        .modal-box h2 {
            text-align: center;
            color: #2c3e50;
            font-size: 20px;
            margin-bottom: 24px;
            font-weight: 600;
        }

        .modal-time-inputs {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
            margin-bottom: 20px;
        }

        .modal-time-inputs .input-group {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }

        .modal-time-inputs .input-group label {
            font-size: 12px;
            color: #999;
            font-weight: 500;
        }

        .modal-time-inputs input[type="number"] {
            width: 80px;
            height: 60px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            text-align: center;
            font-size: 28px;
            font-family: "Consolas", monospace;
            color: #2c3e50;
            outline: none;
            transition: border-color 0.25s;
            -moz-appearance: textfield;
        }

        .modal-time-inputs input[type="number"]::-webkit-inner-spin-button,
        .modal-time-inputs input[type="number"]::-webkit-outer-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        .modal-time-inputs input[type="number"]:focus {
            border-color: #667eea;
        }

        .modal-time-inputs .colon {
            font-size: 32px;
            color: #ccc;
            font-weight: 700;
            margin: 20px 4px 0;
        }

        .modal-actions {
            display: flex;
            gap: 12px;
            justify-content: center;
        }

        .modal-actions button {
            flex: 1;
            padding: 10px 0;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            transition: transform 0.15s, box-shadow 0.15s;
        }

        .modal-actions button:hover {
            transform: translateY(-1px);
        }

        .modal-actions .btn-cancel {
            background: #f0f0f0;
            color: #666;
        }

        .modal-actions .btn-cancel:hover {
            background: #e0e0e0;
        }

        .modal-actions .btn-confirm {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: #fff;
        }

        .modal-actions .btn-confirm:hover {
            box-shadow: 0 4px 14px rgba(102, 126, 234, 0.4);
        }

        /* Toast */
        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(-80px);
            background: #333;
            color: #fff;
            padding: 10px 24px;
            border-radius: 8px;
            font-size: 14px;
            opacity: 0;
            transition: transform 0.35s, opacity 0.35s;
            pointer-events: none;
            z-index: 9999;
        }

        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        @media (max-width: 600px) {
            body { padding: 12px; }

            .header {
                flex-direction: column;
                align-items: center;
                text-align: center;
            }

            .header-left .controls {
                text-align: center;
            }

            .header-left h1 { font-size: 22px; }

            .clock {
                width: 100%;
                max-width: 240px;
            }

            .clock .clock-time { font-size: 24px; }
            .timer-segment .num { font-size: 2.2rem; }
            .timer-sep { font-size: 2.2rem; }
            .timer-display { gap: 4px; }

            .timers-container { gap: 14px; }

            .timers-container.layout-3 .timer-card,
            .timers-container.layout-4 .timer-card { flex: 0 1 100%; max-width: 420px; }
        }

        @media (max-width: 480px) {
            .timers-container.layout-2 .timer-card { flex: 0 1 100%; max-width: 420px; }
        }
    </style>

<body>
    <div class="container">
        <div class="header">
            <div class="header-left">
                <h1>⏱ 多功能计时器</h1>
                <div class="controls">
                    <button id="addTimer">+ 添加计时器</button>
                </div>
            </div>
            <div class="clock" id="clock">
                <div class="clock-date" id="clockDate"></div>
                <div class="clock-time" id="clockTime"></div>
            </div>
        </div>
        <div id="timersContainer" class="timers-container"></div>
    </div>

    <div class="toast" id="toast"></div>

    <!-- 倒计时设置弹窗 -->
    <div class="modal-overlay" id="countdownModal">
        <div class="modal-box">
            <h2>⏱ 设置倒计时</h2>
            <div class="modal-time-inputs">
                <div class="input-group">
                    <label>时</label>
                    <input type="number" id="modalHours" min="0" max="99" value="0">
                </div>
                <span class="colon">:</span>
                <div class="input-group">
                    <label>分</label>
                    <input type="number" id="modalMinutes" min="0" max="59" value="0">
                </div>
                <span class="colon">:</span>
                <div class="input-group">
                    <label>秒</label>
                    <input type="number" id="modalSeconds" min="0" max="59" value="10">
                </div>
            </div>
            <div class="modal-actions">
                <button class="btn-cancel" id="modalCancel">取消</button>
                <button class="btn-confirm" id="modalConfirm">确定</button>
            </div>
        </div>
    </div>

    <script>
        (function() {
            // ---------- Toast ----------
            const toastEl = document.getElementById('toast');
            let toastTimer = null;

            function showToast(msg) {
                if (toastTimer) clearTimeout(toastTimer);
                toastEl.textContent = msg;
                toastEl.classList.add('show');
                toastTimer = setTimeout(() => {
                    toastEl.classList.remove('show');
                    toastTimer = null;
                }, 2000);
            }

            // ---------- localStorage 安全读写（防止损坏数据 / 隐私模式 / 配额超限导致崩溃） ----------
            function readTitles() {
                try {
                    return JSON.parse(localStorage.getItem('timerTitles') || '{}') || {};
                } catch (e) {
                    return {};
                }
            }
            function writeTitles(obj) {
                try {
                    localStorage.setItem('timerTitles', JSON.stringify(obj));
                } catch (e) {
                    /* 忽略：隐私模式或配额超限 */
                }
            }

            // ---------- 系统时钟 ----------
            const clockDateEl = document.getElementById('clockDate');
            const clockTimeEl = document.getElementById('clockTime');
            const weekNames = ['日', '一', '二', '三', '四', '五', '六'];

            function updateClock() {
                const now = new Date();
                const y = now.getFullYear();
                const m = String(now.getMonth() + 1).padStart(2, '0');
                const d = String(now.getDate()).padStart(2, '0');
                const w = weekNames[now.getDay()];
                clockDateEl.textContent = `${y} 年 ${m} 月 ${d} 日 星期${w}`;
                clockTimeEl.textContent =
                    `${String(now.getHours()).padStart(2, '0')}:` +
                    `${String(now.getMinutes()).padStart(2, '0')}:` +
                    `${String(now.getSeconds()).padStart(2, '0')}`;
            }

            updateClock();
            setInterval(updateClock, 1000);

            // ---------- Modal ----------
            const modalOverlay = document.getElementById('countdownModal');
            const modalHours   = document.getElementById('modalHours');
            const modalMinutes = document.getElementById('modalMinutes');
            const modalSeconds = document.getElementById('modalSeconds');
            const modalConfirm = document.getElementById('modalConfirm');
            const modalCancel  = document.getElementById('modalCancel');

            let modalResolve = null;

            function openModal() {
                // 防止并发调用覆盖 modalResolve 导致前一个 Promise 永久悬挂
                if (modalOverlay.classList.contains('active')) {
                    return Promise.resolve(null);
                }
                modalOverlay.classList.add('active');
                setTimeout(() => modalHours.focus(), 100);
                return new Promise((resolve) => {
                    modalResolve = resolve;
                });
            }

            function closeModal() {
                modalOverlay.classList.remove('active');
                modalResolve = null;
            }

            modalConfirm.addEventListener('click', () => {
                const h = parseInt(modalHours.value, 10)   || 0;
                const m = parseInt(modalMinutes.value, 10) || 0;
                const s = parseInt(modalSeconds.value, 10) || 0;

                if (h < 0 || h > 99) { showToast('小时须为 0-99'); return; }
                if (m < 0 || m > 59) { showToast('分钟须为 0-59'); return; }
                if (s < 0 || s > 59) { showToast('秒须为 0-59'); return; }

                const total = h * 3600 + m * 60 + s;
                if (total <= 0) { showToast('倒计时时间必须大于 0'); return; }

                if (modalResolve) modalResolve({ hours: h, minutes: m, seconds: s });
                closeModal();
            });

            modalCancel.addEventListener('click', () => {
                if (modalResolve) modalResolve(null);
                closeModal();
            });

            modalOverlay.addEventListener('click', (e) => {
                if (e.target === modalOverlay) {
                    if (modalResolve) modalResolve(null);
                    closeModal();
                }
            });

            document.addEventListener('keydown', (e) => {
                if (!modalOverlay.classList.contains('active')) return;
                if (e.key === 'Enter') {
                    e.preventDefault();
                    modalConfirm.click();
                } else if (e.key === 'Escape') {
                    e.preventDefault();
                    modalCancel.click();
                }
            });

            // ---------- 响应式布局 ----------
            function updateLayout() {
                const container = document.getElementById('timersContainer');
                const count = container.children.length;
                // 移除所有布局类
                container.className = container.className
                    .replace(/\blayout-\d+\b/g, '')
                    .trim();
                // 根据数量添加布局类
                if (count <= 0) return;
                const cls = count >= 4 ? 'layout-4' : 'layout-' + count;
                container.classList.add(cls);
            }

            // ---------- Timer class ----------
            let timerIdCounter = 0;

            class Timer {
                constructor(container) {
                    this.id = ++timerIdCounter;
                    this.container = container;
                    this.isRunning = false;
                    this.isCountdown = false;
                    this.time = 0;
                    this.countdownStartTime = 0;
                    this.interval = null;
                    this.createTimerElement();
                }

                createTimerElement() {
                    this.card = document.createElement('div');
                    this.card.className = 'timer-card';

                    const radioName = 'timerType_' + this.id;

                    // 卡片头部：左侧标题 + 右侧删除
                    const cardHeader = document.createElement('div');
                    cardHeader.className = 'card-header';

                    // 标题 #序号（可双击编辑）
                    this.titleEl = document.createElement('span');
                    this.titleEl.className = 'card-title';
                    const storedTitles = readTitles();
                    const savedTitle = storedTitles[this.id];
                    this.titleEl.textContent = savedTitle || '#' + this.id;
                    this.titleEl.title = '双击编辑标题';
                    this.titleEl.addEventListener('dblclick', () => this.editTitle());
                    cardHeader.appendChild(this.titleEl);

                    // 删除按钮（垃圾桶图标）
                    this.deleteBtn = document.createElement('button');
                    this.deleteBtn.className = 'btn-delete-icon';
                    this.deleteBtn.innerHTML = '🗑';
                    this.deleteBtn.title = '删除此计时器';
                    this.deleteBtn.addEventListener('click', () => this.delete());
                    cardHeader.appendChild(this.deleteBtn);
                    this.card.appendChild(cardHeader);

                    // 计时器类型选择
                    this.typeSelect = document.createElement('div');
                    this.typeSelect.className = 'timer-type';
                    this.typeSelect.innerHTML = `
                        <label>
                            <input type="radio" name="${radioName}" value="countup" checked> 正计时
                        </label>
                        <label>
                            <input type="radio" name="${radioName}" value="countdown"> 倒计时
                        </label>
                    `;
                    this.card.appendChild(this.typeSelect);

                    this.display = document.createElement('div');
                    this.display.className = 'timer-display';
                    this.display.innerHTML = `
                        <div class="timer-segment">
                            <span class="num">00</span>
                            <span class="label">时</span>
                        </div>
                        <span class="timer-sep">:</span>
                        <div class="timer-segment">
                            <span class="num">00</span>
                            <span class="label">分</span>
                        </div>
                        <span class="timer-sep">:</span>
                        <div class="timer-segment">
                            <span class="num">00</span>
                            <span class="label">秒</span>
                        </div>
                    `;
                    this.numHours   = this.display.querySelector('.timer-segment:nth-child(1) .num');
                    this.numMinutes = this.display.querySelector('.timer-segment:nth-child(3) .num');
                    this.numSeconds = this.display.querySelector('.timer-segment:nth-child(5) .num');
                    this.card.appendChild(this.display);

                    this.controls = document.createElement('div');
                    this.controls.className = 'timer-controls';
                    this.controls.innerHTML = `
                        <button class="start">▶ 开始</button>
                        <button class="pause">⏸ 暂停</button>
                        <button class="reset">↺ 重置</button>
                        <button class="fullscreen">⛶ 全屏</button>
                    `;
                    this.card.appendChild(this.controls);

                    this.addEventListeners();
                    this.container.appendChild(this.card);
                    updateLayout();
                }

                addEventListeners() {
                    this.typeSelect.querySelectorAll('input').forEach(radio => {
                        radio.addEventListener('change', async (e) => {
                            this.isCountdown = e.target.value === 'countdown';
                            if (this.isCountdown) {
                                this.pause();
                                const result = await openModal();
                                if (result) {
                                    const total = result.hours * 3600 + result.minutes * 60 + result.seconds;
                                    this.countdownStartTime = total;
                                    this.time = total;
                                    this.card.classList.remove('countdown-finished');
                                    this.updateDisplay();
                                } else {
                                    this.typeSelect.querySelector('input[value="countup"]').checked = true;
                                    this.isCountdown = false;
                                }
                            } else {
                                this.reset();
                            }
                        });
                    });

                    this.controls.querySelector('.start').addEventListener('click', () => this.start());
                    this.controls.querySelector('.pause').addEventListener('click', () => this.pause());
                    this.controls.querySelector('.reset').addEventListener('click', () => this.reset());
                    this.controls.querySelector('.fullscreen').addEventListener('click', () => this.toggleFullscreen());
                }

                start() {
                    if (!this.isRunning) {
                        if (this.isCountdown && this.time <= 0) {
                            this.time = this.countdownStartTime;
                            this.card.classList.remove('countdown-finished');
                            this.updateDisplay();
                        }
                        this.isRunning = true;
                        this.interval = setInterval(() => this.updateTime(), 1000);
                    }
                }

                pause() {
                    if (this.isRunning) {
                        clearInterval(this.interval);
                        this.isRunning = false;
                    }
                }

                reset() {
                    this.pause();
                    this.time = this.isCountdown ? this.countdownStartTime : 0;
                    this.card.classList.remove('countdown-finished');
                    this.updateDisplay();
                }

                updateTime() {
                    if (this.isCountdown) {
                        this.time--;
                        if (this.time <= 0) {
                            // 归零即结束，避免多显示一拍 00:00:00
                            this.time = 0;
                            this.updateDisplay();
                            this.pause();
                            this.card.classList.add('countdown-finished');
                            showToast('⏰ 倒计时结束！');
                            return;
                        }
                    } else {
                        this.time++;
                    }
                    this.updateDisplay();
                }

                updateDisplay() {
                    const hours = Math.floor(this.time / 3600);
                    const minutes = Math.floor((this.time % 3600) / 60);
                    const seconds = this.time % 60;
                    this.numHours.textContent   = hours.toString().padStart(2, '0');
                    this.numMinutes.textContent = minutes.toString().padStart(2, '0');
                    this.numSeconds.textContent = seconds.toString().padStart(2, '0');
                }

                toggleFullscreen() {
                    const entering = !this.card.classList.contains('fullscreen');
                    this.card.classList.toggle('fullscreen');
                    document.body.classList.toggle('has-fullscreen', entering);
                    if (entering) {
                        document.addEventListener('keydown', this._handleEscape);
                    } else {
                        document.removeEventListener('keydown', this._handleEscape);
                    }
                }

                _handleEscape = (e) => {
                    if (e.key === 'Escape' && this.card.classList.contains('fullscreen')) {
                        this.card.classList.remove('fullscreen');
                        document.body.classList.remove('has-fullscreen');
                        document.removeEventListener('keydown', this._handleEscape);
                    }
                }

                // 双击编辑标题
                editTitle() {
                    // 防止重复调用导致监听器叠加
                    if (this.titleEl.contentEditable === 'true') return;

                    this.titleEl.contentEditable = true;
                    this.titleEl.focus();

                    // 选中全部文本
                    const range = document.createRange();
                    range.selectNodeContents(this.titleEl);
                    const sel = window.getSelection();
                    sel.removeAllRanges();
                    sel.addRange(range);

                    const finish = () => {
                        if (this.titleEl.contentEditable !== 'true') return;
                        this.titleEl.contentEditable = false;
                        this.saveTitle();
                        this.titleEl.removeEventListener('blur', finish);
                        this.titleEl.removeEventListener('keydown', handleKey);
                    };

                    const handleKey = (e) => {
                        if (e.key === 'Enter') {
                            e.preventDefault();
                            this.titleEl.blur();
                        } else if (e.key === 'Escape') {
                            e.preventDefault();
                            // 恢复原标题
                            const storedTitles = readTitles();
                            this.titleEl.textContent = storedTitles[this.id] || '#' + this.id;
                            this.titleEl.contentEditable = false;
                            this.titleEl.removeEventListener('blur', finish);
                            this.titleEl.removeEventListener('keydown', handleKey);
                        }
                    };

                    this.titleEl.addEventListener('blur', finish);
                    this.titleEl.addEventListener('keydown', handleKey);
                }

                saveTitle() {
                    // 以 textContent 重新赋值，剥离 contentEditable 可能粘贴的富文本/HTML，仅保留纯文本
                    let text = this.titleEl.textContent.trim();
                    if (!text) {
                        text = '#' + this.id;
                    }
                    this.titleEl.textContent = text;
                    const storedTitles = readTitles();
                    storedTitles[this.id] = text;
                    writeTitles(storedTitles);
                }

                delete() {
                    clearInterval(this.interval);
                    document.removeEventListener('keydown', this._handleEscape);
                    if (this.card.classList.contains('fullscreen')) {
                        document.body.classList.remove('has-fullscreen');
                    }
                    // 从 localStorage 中移除标题
                    const storedTitles = readTitles();
                    delete storedTitles[this.id];
                    writeTitles(storedTitles);
                    this.container.removeChild(this.card);
                    updateLayout();
                }
            }

            // ---------- 初始化 ----------
            document.addEventListener('DOMContentLoaded', () => {
                const timersContainer = document.getElementById('timersContainer');
                const addTimerBtn = document.getElementById('addTimer');

                addTimerBtn.addEventListener('click', () => {
                    new Timer(timersContainer);
                });

                new Timer(timersContainer);
            });
        })();
    </script>
</body>
</html>
