function timeToSeconds(str) {
  if (!str || !str.trim()) return null;
  str = str.trim();
  if (str.includes(':')) {
    const parts = str.split(':');
    if (parts.length === 2) {
      const mins = parseFloat(parts[0]);
      const secs = parseFloat(parts[1]);
      if (isNaN(mins) || isNaN(secs)) return null;
      return mins * 60 + secs;
    }
    return null;
  }
  const v = parseFloat(str);
  return isNaN(v) ? null : v;
}

function secondsToDisplay(s) {
  if (s === null || s === undefined || s === 9999) return '—';
  if (s >= 60) {
    const m = Math.floor(s / 60);
    const rem = s % 60;
    return m + ':' + rem.toFixed(2).padStart(5, '0');
  }
  return s.toFixed(2);
}

// =====================================================================
// 运动员技术等级查询
// =====================================================================
function querySportGrade() {
  const gender = document.getElementById('s-gender').value;
  const pool   = document.getElementById('s-pool').value;
  const event  = document.getElementById('s-event').value;
  const timeStr = document.getElementById('s-time').value;

  const resultEl = document.getElementById('sport-result');

  if (!gender || !pool || !event || !timeStr.trim()) {
    resultEl.innerHTML = `<div class="no-result-box"><div class="icon">⚠️</div><p>请填写所有查询条件</p></div>`;
    return;
  }

  const seconds = timeToSeconds(timeStr);
  if (seconds === null || seconds <= 0) {
    resultEl.innerHTML = `<div class="no-result-box"><div class="icon">⚠️</div><p>成绩格式有误，请输入如 <b>25.00</b> 或 <b>1:03.50</b> 的格式</p></div>`;
    return;
  }

  const data = D[gender] && D[gender][parseInt(pool)] && D[gender][parseInt(pool)][event];
  if (!data || data[0] === 9999) {
    resultEl.innerHTML = `<div class="no-result-box"><div class="icon">❌</div><p>该性别/泳池类型暂无此项目数据，<br>请核实所选项目是否适用</p></div>`;
    return;
  }

  // 找到达到的最高等级（越低秒数越好）
  let achievedLevel = -1; // -1 = 未达三级
  for (let i = 0; i < 5; i++) {
    if (data[i] !== 9999 && seconds <= data[i]) {
      achievedLevel = i;
      break;
    }
  }

  const genderLabel = gender === 'male' ? '男子' : '女子';
  const poolLabel   = pool + '米' + (pool === '50' ? '长池' : '短池');
  const eventLabel  = EVENT_NAMES[event] || event;

  let html = '';

  // 达级结果展示
  if (achievedLevel >= 0) {
    const gradeName = SPORT_GRADES[achievedLevel];
    const color     = GRADE_COLORS[gradeName] || '#0369a1';
    html += `<div class="result-area">
      <div style="background:${color};border-radius:14px;overflow:hidden;box-shadow:0 6px 24px rgba(0,0,0,0.15);margin-bottom:16px;">
        <div style="padding:20px 24px;text-align:center;">
          <div style="font-size:14px;color:rgba(255,255,255,0.85);margin-bottom:6px;">🎉 恭喜！达级结果</div>
          <div style="font-size:30px;font-weight:800;color:#fbbf24;text-shadow:0 2px 6px rgba(0,0,0,0.3);">${gradeName}</div>
          <div style="font-size:13px;color:rgba(255,255,255,0.8);margin-top:6px;">${genderLabel} · ${poolLabel} · ${eventLabel} · ${secondsToDisplay(seconds)}</div>
        </div>
      </div>`;
  } else {
    html += `<div class="result-area">
      <div class="no-grade-box" style="margin-bottom:16px;">
        <div class="ng-icon">😔</div>
        <div class="ng-title">暂未达到三级运动员标准</div>
        <div class="ng-hint">${genderLabel} · ${poolLabel} · ${eventLabel} · 成绩 ${secondsToDisplay(seconds)}</div>
        <div class="ng-hint" style="margin-top:6px;">距三级标准还差 <b style="color:#ef4444;">${(seconds - data[4]).toFixed(2)}秒</b>，继续努力！</div>
      </div>`;
  }

  // 各等级明细表格
  html += `<div style="background:white;border-radius:12px;overflow:hidden;box-shadow:0 2px 12px rgba(0,0,0,0.06);">
    <table class="grades-table">
      <thead><tr><th>等级</th><th>达级标准</th><th>您的成绩</th><th>状态</th></tr></thead>
      <tbody>`;

  SPORT_GRADES.forEach((grade, i) => {
    const std = data[i];
    const isAchieved = std !== 9999 && seconds <= std;
    const isCurrent  = i === achievedLevel;
    const stdStr  = secondsToDisplay(std);
    const myStr   = secondsToDisplay(seconds);
    const diff    = std !== 9999 ? (seconds - std).toFixed(2) : null;
    const diffStr = diff !== null ? (diff > 0 ? `慢 ${diff}s` : `快 ${Math.abs(diff)}s`) : '—';
    const statusStr = std === 9999 ? '—' : (isAchieved ? '✅ 达标' : '❌ 未达');
    const rowStyle  = isCurrent ? 'background:#fffbeb;font-weight:700;' : (isAchieved ? 'background:#f0fdf4;' : '');
    const color     = GRADE_COLORS[grade];

    html += `<tr style="${rowStyle}">
      <td><span style="background:${color};color:white;padding:3px 10px;border-radius:12px;font-size:13px;font-weight:600;">${grade}</span></td>
      <td>${stdStr}</td>
      <td style="font-weight:600;">${myStr}</td>
      <td style="color:${isAchieved ? '#059669' : '#9ca3af'};font-weight:${isAchieved ? '700' : '400'};">${statusStr}</td>
    </tr>`;
  });

  html += `</tbody></table></div></div>`;

  resultEl.innerHTML = html;
}

  } else {

    <table class="grades-table">
      <thead><tr><th>等级</th><th>达级标准</th><th>您的成绩</th><th>状态</th></tr></thead>
      <tbody>`;

  EXERCISE_GRADES.forEach((grade, i) => {
    const std       = data[i];
    const isAchieved = seconds <= std;
    const isCurrent  = i === achievedLevel;
    const stdStr    = secondsToDisplay(std);
    const myStr     = secondsToDisplay(seconds);
    const diff      = (seconds - std).toFixed(2);
    const diffStr   = diff > 0 ? `慢 ${diff}s` : `快 ${Math.abs(diff)}s`;
    const statusStr = isAchieved ? '✅ 达标' : '❌ 未达';
    const rowStyle  = isCurrent ? 'background:#fffbeb;font-weight:700;' : (isAchieved ? 'background:#f0fdf4;' : '');
    const color     = GRADE_COLORS[EXERCISE_GRADE_SHORT[i]];

    html += `<tr style="${rowStyle}">
      <td><span style="background:${color};color:white;padding:3px 10px;border-radius:12px;font-size:13px;font-weight:600;">${grade}</span></td>
      <td>${stdStr}</td>
      <td style="font-weight:600;">${myStr}</td>
      <td style="color:${isAchieved ? '#059669' : '#9ca3af'};font-weight:${isAchieved ? '700' : '400'};">${statusStr}</td>
    </tr>`;
  });

  html += `</tbody></table></div></div>`;

  resultEl.innerHTML = html;
}

// 根据性别动态过滤项目
function filterSportEvents() {
  const gender  = document.getElementById('s-gender').value;
  const sel     = document.getElementById('s-event');
  const options = sel.querySelectorAll('option');

  // 保存当前选中值
  const prevVal = sel.value;
  let foundValid = false;

  options.forEach(opt => {
    const restrict = opt.getAttribute('data-gender');
    if (!restrict) {
      opt.style.display = ''; // 无限制，始终显示
      if (opt.value === prevVal) foundValid = true;
    } else if (restrict === 'female' && gender === 'male') {
      opt.style.display = 'none'; // 男子隐藏女子专属项目
    } else {
      opt.style.display = '';
      if (opt.value === prevVal) foundValid = true;
    }
  });

  // 如果当前选中的项目被隐藏了，清空选择
  if (!foundValid && prevVal) {
    sel.value = '';
  }
}
