// 区域排序
const regionOrder = ["华北","华东","华南","华中","东北","西部","西南"];

let activeFilter = 'all';

function tagHTML(tags) {
  return tags.map(t => `<span class="tag tag-${t}">${t}</span>`).join('');
}

function cardHTML(u) {
  const phd = u.phd
    ? `<span class="chip chip-phd">博士点</span>`
    : `<span class="chip" style="background:#f8fafc;color:#9ca3af">无博士点</span>`;
  return `
    <div class="uni-card"
         data-name="${u.name}"
         data-province="${u.province}"
         data-tags="${u.tags.join(',')}"
         data-phd="${u.phd ? '1' : '0'}">
      <div class="uni-name">${u.name}</div>
      <div class="tag-row">${tagHTML(u.tags)}</div>
      <div class="info-row">
        <span class="chip chip-type">${u.type}</span>
        <span class="chip chip-nature">${u.nature}</span>
        ${phd}
      </div>
      <a class="uni-link" href="${u.url}" target="_blank" rel="noopener">${u.url.replace('https://','')}</a>
    </div>
  `;
}

function buildUI() {
  const main = document.getElementById('mainContent');
  main.innerHTML = '';
  regionOrder.forEach(region => {
    const unis = universities.filter(u => u.region === region);
    const section = document.createElement('section');
    section.className = `region-section region-${region}`;
    section.dataset.region = region;

    // region header
    const headerHTML = `
      <div class="region-header">
        <div class="region-dot"></div>
        <h2>${region}地区</h2>
        <span class="region-count" id="count-${region}">${unis.length} 所</span>
      </div>
    `;

    // group by province
    const provinceMap = new Map();
    unis.forEach(u => {
      if (!provinceMap.has(u.province)) provinceMap.set(u.province, []);
      provinceMap.get(u.province).push(u);
    });

    let bodyHTML = '';
    provinceMap.forEach((pUnis, province) => {
      bodyHTML += `
        <div class="province-subsection" data-province="${province}">
          <div class="province-header">
            <h3>${province}</h3>
            <span class="province-sub-count" id="pcount-${region}-${province}">${pUnis.length} 所</span>
          </div>
          <div class="uni-grid">
            ${pUnis.map(u => cardHTML(u)).join('')}
          </div>
        </div>
      `;
    });

    section.innerHTML = headerHTML + bodyHTML;
    main.appendChild(section);
  });
  applyFilters();
}

function setFilter(tag) {
  activeFilter = tag;
  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.f === tag);
  });
  applyFilters();
}

function applyFilters() {
  const query = document.getElementById('searchInput').value.trim().toLowerCase();
  let total = 0;
  const regionCounts = {};

  regionOrder.forEach(region => {
    let regionVisible = 0;
    const section = document.querySelector(`.region-section[data-region="${region}"]`);
    if (!section) return;

    const subs = section.querySelectorAll('.province-subsection');
    subs.forEach(sub => {
      let provinceVisible = 0;
      const cards = sub.querySelectorAll('.uni-card');
      cards.forEach(card => {
        const name = card.dataset.name.toLowerCase();
        const province = card.dataset.province.toLowerCase();
        const tags = card.dataset.tags.split(',');
        const hasPhd = card.dataset.phd === '1';

        let matchFilter = true;
        if (activeFilter !== 'all') {
          if (activeFilter === '博士') matchFilter = hasPhd;
          else matchFilter = tags.includes(activeFilter);
        }
        const matchSearch = !query || name.includes(query) || province.includes(query);
        const visible = matchFilter && matchSearch;
        card.style.display = visible ? '' : 'none';
        if (visible) { provinceVisible++; regionVisible++; total++; }
      });

      // update province sub count
      const prv = sub.dataset.province;
      const pCountEl = document.getElementById(`pcount-${region}-${prv}`);
      if (pCountEl) pCountEl.textContent = `${provinceVisible} 所`;
      sub.style.display = provinceVisible === 0 ? 'none' : '';
    });

    // update region count
    const rCountEl = document.getElementById(`count-${region}`);
    if (rCountEl) rCountEl.textContent = `${regionVisible} 所`;
    section.style.display = regionVisible === 0 ? 'none' : '';
  });

  document.getElementById('countBadge').textContent = `共 ${total} 所`;

  // empty state
  const main = document.getElementById('mainContent');
  let emptyEl = document.getElementById('emptyState');
  if (total === 0 && !emptyEl) {
    emptyEl = document.createElement('div');
    emptyEl.id = 'emptyState';
    emptyEl.className = 'empty-state';
    emptyEl.textContent = '没有找到匹配的学校，换个关键词试试 ~';
    main.appendChild(emptyEl);
  } else if (total > 0 && emptyEl) {
    emptyEl.remove();
  }
}

buildUI();
