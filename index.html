
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>导航</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }

        body {
            background-color: #f5f7fa;
            max-width: 700px;
            margin: 0 auto;
            padding: 0 20px 100px;
            line-height: 1.5;
        }

        /* ———— 苹果风格顶部导航 ———— */
        .nav {
            position: sticky;
            top: 20px;
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 16px 20px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
            margin: 20px 0 40px;
            text-align: center;
            z-index: 999;
        }

        .nav a {
            display: inline-block;
            margin: 0 14px;
            color: #1d1d1f;
            text-decoration: none;
            font-size: 15px;
            font-weight: 500;
            transition: all 0.2s ease;
        }

        .nav a:hover {
            color: #007aff;
            transform: scale(1.05);
        }

        /* ———— 苹果风标题 ———— */
        .list-title {
            font-size: 24px;
            font-weight: 600;
            color: #1d1d1f;
            margin: 50px 0 20px;
            scroll-margin-top: 100px;
        }

        /* ———— 苹果风卡片列表 ———— */
        .numbered-link-list {
            counter-reset: link-counter;
            list-style: none;
            background: #ffffff;
            border-radius: 18px;
            padding: 28px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.05);
            margin-bottom: 10px;
        }

        .numbered-link-list li {
            position: relative;
            padding-left: 36px;
            margin: 16px 0;
        }

        /* ———— 自动编号样式 ———— */
        .numbered-link-list li::before {
            counter-increment: link-counter;
            content: counter(link-counter);
            position: absolute;
            left: 0;
            width: 26px;
            height: 26px;
            border-radius: 50%;
            background-color: #e1f0ff;
            color: #007aff;
            font-size: 13px;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* ———— 链接样式 ———— */
        .numbered-link-list a {
            color: #1d1d1f;
            text-decoration: none;
            font-size: 16px;
            transition: color 0.2s ease;
        }

        .numbered-link-list a:hover {
            color: #007aff;
        }
    </style>
</head>

<body>
    <!-- 顶部导航 -->
    <div class="nav">
        <a href="#hot">热门链接</a>
        <a href="#tools">实用工具</a>
        <a href="#docs">官方文档</a>

    </div>

    </ul>
